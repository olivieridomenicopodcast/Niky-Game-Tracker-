<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎮 NIKY'S GAME TRACKER</title>
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./icon-192.png">
<link rel="icon" type="image/png" sizes="192x192" href="./icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="./icon-512.png">
<meta name="theme-color" content="#00e5ff">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323:wght@400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #0d0d1a;
    --bg2:      #13132b;
    --panel:    #1a1a3e;
    --panel2:   #21214f;
    --border:   #4040a0;
    --border2:  #6060d0;
    --cyan:     #00e5ff;
    --pink:     #ff2d78;
    --yellow:   #ffe600;
    --green:    #00ff88;
    --purple:   #b44dff;
    --orange:   #ff8800;
    --text:     #e8e8ff;
    --dim:      #8888cc;
    --shadow:   #000033;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'VT323', monospace;
    font-size: 20px;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.08) 2px, rgba(0,0,0,0.08) 4px);
    pointer-events: none;
    z-index: 9999;
  }

  /* HEADER */
  header {
    background: var(--bg2);
    border-bottom: 4px solid var(--cyan);
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 4px 0 var(--shadow);
  }

  .header-sprite {
    font-size: 36px;
    animation: bounce 1s steps(2) infinite;
    flex-shrink: 0;
  }

  @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }

  header h1 {
    font-family: 'Press Start 2P', monospace;
    font-size: clamp(9px, 2vw, 14px);
    color: var(--cyan);
    text-shadow: 3px 3px 0 var(--pink);
    line-height: 1.6;
    flex-shrink: 0;
  }

  .header-stats {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    flex: 1;
  }

  .stat-chip {
    background: var(--panel);
    border: 2px solid var(--border);
    padding: 4px 10px;
    font-size: 15px;
    color: var(--dim);
    white-space: nowrap;
  }
  .stat-chip span { color: var(--yellow); }

  .header-backup {
    display: flex;
    gap: 8px;
    flex-shrink: 0;
  }

  /* NAV */
  nav {
    display: flex;
    background: var(--bg2);
    border-bottom: 4px solid var(--border);
    overflow-x: auto;
    scrollbar-width: none;
  }
  nav::-webkit-scrollbar { display: none; }

  .tab-btn {
    font-family: 'Press Start 2P', monospace;
    font-size: 9px;
    padding: 14px 16px;
    background: transparent;
    color: var(--dim);
    border: none;
    border-right: 2px solid var(--border);
    cursor: pointer;
    white-space: nowrap;
    transition: color 0.1s, background 0.1s;
    position: relative;
  }
  .tab-btn:hover { color: var(--text); background: var(--panel); }
  .tab-btn.active { color: var(--yellow); background: var(--panel); }
  .tab-btn.active::after {
    content: '';
    position: absolute;
    bottom: -4px; left: 0; right: 0;
    height: 4px;
    background: var(--yellow);
  }
  .tab-icon { margin-right: 5px; }

  /* MAIN */
  main { padding: 24px 20px; max-width: 960px; margin: 0 auto; }
  .section { display: none; }
  .section.active { display: block; }

  .section-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
    border-bottom: 3px solid var(--border);
    padding-bottom: 12px;
  }
  .section-title {
    font-family: 'Press Start 2P', monospace;
    font-size: 11px;
    color: var(--cyan);
  }
  .section-count {
    background: var(--pink);
    color: #fff;
    font-size: 14px;
    padding: 2px 8px;
    margin-left: auto;
  }

  /* FORM */
  .add-form {
    background: var(--panel);
    border: 3px solid var(--border);
    padding: 16px;
    margin-bottom: 20px;
    display: grid;
    gap: 12px;
  }
  .add-form-title {
    font-family: 'Press Start 2P', monospace;
    font-size: 9px;
    color: var(--green);
  }
  .form-row {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    align-items: flex-end;
  }
  .form-group {
    display: flex;
    flex-direction: column;
    gap: 5px;
    flex: 1;
    min-width: 130px;
  }
  .form-group label { font-size: 14px; color: var(--dim); }

  input[type="text"],
  input[type="number"],
  select,
  textarea {
    background: var(--bg);
    border: 2px solid var(--border);
    color: var(--text);
    font-family: 'VT323', monospace;
    font-size: 18px;
    padding: 6px 10px;
    outline: none;
    width: 100%;
    transition: border-color 0.15s;
  }
  input:focus, select:focus, textarea:focus {
    border-color: var(--cyan);
    box-shadow: 0 0 0 2px rgba(0,229,255,0.15);
  }
  select option { background: var(--bg); }

  /* TOGGLE */
  .toggle-field { display: flex; align-items: center; gap: 8px; }
  .toggle-btn {
    font-family: 'Press Start 2P', monospace;
    font-size: 8px;
    padding: 7px 12px;
    border: 2px solid var(--border);
    background: var(--bg);
    color: var(--dim);
    cursor: pointer;
    min-width: 58px;
    text-align: center;
    transition: all 0.1s;
  }
  .toggle-btn.yes { background: rgba(0,255,136,0.12); border-color: var(--green); color: var(--green); }
  .toggle-btn.no  { background: rgba(255,45,120,0.12); border-color: var(--pink);  color: var(--pink); }

  /* BUTTONS */
  .pixel-btn {
    font-family: 'Press Start 2P', monospace;
    font-size: 9px;
    padding: 10px 14px;
    border: none;
    cursor: pointer;
    transition: transform 0.05s, filter 0.05s;
    white-space: nowrap;
    display: inline-flex;
    align-items: center;
    gap: 5px;
  }
  .pixel-btn:active { transform: translate(2px,2px); filter: brightness(0.85); }

  .btn-add    { background: var(--green);  color: var(--bg); box-shadow: 4px 4px 0 #008844; }
  .btn-delete { background: var(--pink);   color: #fff;      box-shadow: 3px 3px 0 #880022; font-size: 8px; padding: 7px 10px; }
  .btn-manage { background: var(--purple); color: #fff;      box-shadow: 4px 4px 0 #660099; }
  .btn-export { background: var(--yellow); color: var(--bg); box-shadow: 3px 3px 0 #887700; font-size: 8px; padding: 8px 12px; }
  .btn-import {
    font-family: 'Press Start 2P', monospace;
    font-size: 8px;
    padding: 8px 12px;
    background: var(--panel);
    color: var(--dim);
    border: 2px solid var(--border);
    box-shadow: 3px 3px 0 var(--shadow);
    cursor: pointer;
    letter-spacing: 0.5px;
    transition: transform 0.05s, filter 0.05s, color 0.1s;
  }
  .btn-import:hover  { color: var(--text); border-color: var(--border2); }
  .btn-import:active { transform: translate(2px,2px); filter: brightness(0.85); }

  /* GAME CARD */
  .game-list { display: flex; flex-direction: column; gap: 10px; }

  .game-card {
    background: var(--panel);
    border: 2px solid var(--border);
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
    position: relative;
    overflow: hidden;
    transition: border-color 0.1s, background 0.1s;
  }
  .game-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 4px;
  }
  .game-card.cat-board::before { background: var(--orange); }
  .game-card.cat-video::before { background: var(--cyan); }
  .game-card.cat-other::before { background: var(--purple); }
  .game-card:hover { border-color: var(--border2); background: var(--panel2); }

  .game-name { font-size: 20px; flex: 1; min-width: 100px; }

  .game-meta {
    font-size: 16px;
    color: var(--dim);
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    align-items: center;
  }

  .badge {
    font-family: 'Press Start 2P', monospace;
    font-size: 7px;
    padding: 4px 8px;
    white-space: nowrap;
  }
  .badge-out-yes { background: var(--green);  color: var(--bg); }
  .badge-out-no  { background: var(--pink);   color: #fff; }
  .badge-playing { background: var(--yellow); color: var(--bg); animation: blink 1.2s steps(1) infinite; }

  @keyframes blink { 50% { opacity: 0.4; } }

  .price-tag { color: var(--yellow); }
  .date-tag  { color: var(--cyan); }

  .countdown-today  { font-family:'Press Start 2P',monospace; font-size:7px; padding:3px 7px; background:var(--yellow); color:var(--bg); animation:blink 1s steps(1) infinite; }
  .countdown-future { font-family:'Press Start 2P',monospace; font-size:7px; padding:3px 7px; background:rgba(0,229,255,0.15); color:var(--cyan); border:1px solid var(--cyan); }
  .countdown-recent { font-family:'Press Start 2P',monospace; font-size:7px; padding:3px 7px; background:rgba(0,255,136,0.12); color:var(--green); border:1px solid var(--green); }

  .wishlist-star { cursor:pointer; font-size:18px; transition:transform 0.1s; color:var(--dim); }
  .wishlist-star.active { color:var(--yellow); }
  .wishlist-star:hover { transform:scale(1.3); }

  .btn-edit { background:var(--cyan); color:var(--bg); box-shadow:3px 3px 0 #007799; font-size:8px; padding:7px 10px; }

  .edit-form {
    display: none;
    width: 100%;
    background: var(--bg);
    border-top: 2px solid var(--border2);
    margin-top: 10px;
    padding-top: 12px;
    gap: 10px;
    flex-wrap: wrap;
  }
  .edit-form.open { display: flex; }
  .edit-form input, .edit-form select { font-size:16px; padding:5px 8px; }
  .edit-form label { font-size:13px; color:var(--dim); }

  /* FILTER */
  .filter-bar { display:flex; gap:8px; margin-bottom:16px; flex-wrap:wrap; align-items:center; }
  .filter-bar label { font-size:14px; color:var(--dim); }
  .filter-btn {
    font-family:'Press Start 2P',monospace; font-size:8px; padding:6px 10px;
    background:var(--bg); border:2px solid var(--border); color:var(--dim); cursor:pointer; transition:all 0.1s;
  }
  .filter-btn.active { background:var(--panel2); border-color:var(--cyan); color:var(--cyan); }

  /* EMPTY */
  .empty-state { text-align:center; padding:40px 20px; color:var(--dim); border:2px dashed var(--border); }
  .empty-state .pix { font-size:48px; margin-bottom:12px; display:block; }
  .empty-state p { font-size:16px; }

  /* MANAGE */
  .manage-card {
    background:var(--panel); border:2px solid var(--border);
    padding:14px 16px; display:flex; align-items:center;
    gap:12px; flex-wrap:wrap; margin-bottom:10px;
  }
  .manage-name { font-size:20px; flex:1; min-width:120px; }
  .when-tag { font-size:16px; color:var(--orange); background:rgba(255,136,0,0.12); border:1px solid var(--orange); padding:2px 8px; }

  /* NOTES */
  .note-card { background:var(--panel); border:2px solid var(--border); padding:14px; margin-bottom:12px; display:flex; gap:12px; align-items:flex-start; }
  .note-num  { font-family:'Press Start 2P',monospace; font-size:10px; color:var(--purple); min-width:28px; padding-top:6px; }
  textarea.note-text {
    background:var(--bg); border:2px solid var(--border); color:var(--text);
    font-family:'VT323',monospace; font-size:19px; padding:8px;
    resize:vertical; min-height:70px; flex:1; outline:none; transition:border-color 0.15s;
  }
  textarea.note-text:focus { border-color:var(--purple); }

  /* TOAST */
  #toast {
    position:fixed; bottom:24px; right:24px;
    background:var(--green); color:var(--bg);
    font-family:'Press Start 2P',monospace; font-size:9px;
    padding:12px 18px; box-shadow:6px 6px 0 rgba(0,0,0,0.5);
    z-index:9000; transform:translateY(100px); opacity:0;
    transition:transform 0.2s, opacity 0.2s; max-width:280px;
  }
  #toast.show  { transform:translateY(0); opacity:1; }
  #toast.error { background:var(--pink); color:#fff; }

  /* RESPONSIVE */
  @media (max-width:600px) {
    .header-stats { order:3; width:100%; }
    .header-backup { order:2; }
    main { padding:16px 12px; }
    .form-row { flex-direction:column; }
    .form-group { min-width:unset; }
  }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width:8px; height:8px; }
  ::-webkit-scrollbar-track { background:var(--bg); }
  ::-webkit-scrollbar-thumb { background:var(--border); }
  ::-webkit-scrollbar-thumb:hover { background:var(--border2); }
</style>
</head>
<body>

<header>
  <span class="header-sprite">👾</span>
  <h1>NIKY'S<br>GAME TRACKER</h1>
  <div class="header-stats">
    <div class="stat-chip">🎲 Tavolo: <span id="sc-board">0</span></div>
    <div class="stat-chip">🕹️ Video: <span id="sc-video">0</span></div>
    <div class="stat-chip">📦 Altro: <span id="sc-other">0</span></div>
    <div class="stat-chip">⚡ Gestione: <span id="sc-manage">0</span></div>
  </div>
  <div class="header-backup">
    <button class="pixel-btn btn-export" onclick="exportData()">💾 BACKUP</button>
    <label class="btn-import">
      📂 IMPORTA
      <input type="file" accept=".json" onchange="importData(event)" style="display:none;">
    </label>
  </div>
</header>

<nav>
  <button class="tab-btn active" onclick="switchTab('board',this)"><span class="tab-icon">🎲</span>TAVOLO</button>
  <button class="tab-btn" onclick="switchTab('video',this)"><span class="tab-icon">🕹️</span>VIDEOGIOCHI</button>
  <button class="tab-btn" onclick="switchTab('other',this)"><span class="tab-icon">📦</span>ALTRO</button>
  <button class="tab-btn" onclick="switchTab('manage',this)"><span class="tab-icon">⚙️</span>GESTIONE</button>
  <button class="tab-btn" onclick="switchTab('notes',this)"><span class="tab-icon">📝</span>NOTE</button>
</nav>

<main>

  <!-- BOARD -->
  <section class="section active" id="sec-board">
    <div class="section-header">
      <span class="section-title">🎲 GIOCHI DA TAVOLO</span>
      <span class="section-count" id="count-board">0</span>
    </div>
    <div class="add-form">
      <div class="add-form-title">▶ AGGIUNGI GIOCO</div>
      <div class="form-row">
        <div class="form-group" style="flex:2;min-width:200px;">
          <label>Nome Gioco</label>
          <input type="text" id="board-name" placeholder="es. Gloomhaven..." onkeydown="if(event.key==='Enter')addGame('board')">
        </div>
        <div class="form-group">
          <label>📅 Data esatta (per countdown)</label>
          <input type="date" id="board-date">
        </div>
        <div class="form-group">
          <label>📝 Uscita generica (se non c'è data)</label>
          <input type="text" id="board-datetext" placeholder="es. 2026, Estate 2027, TBA...">
        </div>
        <div class="form-group">
          <label>Prezzo (€)</label>
          <input type="number" id="board-price" placeholder="0.00" min="0" step="0.01">
        </div>
      </div>
      <div class="form-row" style="align-items:center;gap:16px;">
        <div class="toggle-field">
          <label style="font-size:14px;color:var(--dim)">Già uscito:</label>
          <button class="toggle-btn no" id="board-out" onclick="toggleBtn(this)">NO</button>
        </div>
        <div class="toggle-field">
          <label style="font-size:14px;color:var(--dim)">Wishlist ⭐:</label>
          <button class="toggle-btn no" id="board-wish" onclick="toggleBtn(this)">NO</button>
        </div>
        <div class="form-group" style="min-width:130px;flex:0;">
          <label>Priorità</label>
          <select id="board-priority">
            <option value="alta">🔴 Alta</option>
            <option value="media" selected>🟡 Media</option>
            <option value="bassa">🟢 Bassa</option>
          </select>
        </div>
        <button class="pixel-btn btn-add" onclick="addGame('board')" style="margin-top:18px;">+ AGGIUNGI</button>
      </div>
    </div>
    <div class="filter-bar">
      <label>FILTRO:</label>
      <button class="filter-btn active" onclick="setFilter('board','all',this)">TUTTI</button>
      <button class="filter-btn" onclick="setFilter('board','out',this)">USCITI</button>
      <button class="filter-btn" onclick="setFilter('board','incoming',this)">IN ARRIVO</button>
      <button class="filter-btn" onclick="setFilter('board','wish',this)">⭐ WISH</button>
    </div>
    <div class="game-list" id="list-board"></div>
  </section>

  <!-- VIDEO -->
  <section class="section" id="sec-video">
    <div class="section-header">
      <span class="section-title">🕹️ VIDEOGIOCHI</span>
      <span class="section-count" id="count-video">0</span>
    </div>
    <div class="add-form">
      <div class="add-form-title">▶ AGGIUNGI GIOCO</div>
      <div class="form-row">
        <div class="form-group" style="flex:2;min-width:200px;">
          <label>Nome Gioco</label>
          <input type="text" id="video-name" placeholder="es. Elden Ring 2..." onkeydown="if(event.key==='Enter')addGame('video')">
        </div>
        <div class="form-group">
          <label>Piattaforma</label>
          <select id="video-platform">
            <option>PC</option><option>PS5</option><option>PS4</option>
            <option>Xbox</option><option>Switch</option><option>Mobile</option><option>Altro</option>
          </select>
        </div>
        <div class="form-group">
          <label>📅 Data esatta (per countdown)</label>
          <input type="date" id="video-date">
        </div>
        <div class="form-group">
          <label>📝 Uscita generica (se non c'è data)</label>
          <input type="text" id="video-datetext" placeholder="es. 2026, Estate 2027, TBA...">
        </div>
        <div class="form-group">
          <label>Prezzo (€)</label>
          <input type="number" id="video-price" placeholder="0.00" min="0" step="0.01">
        </div>
      </div>
      <div class="form-row" style="align-items:center;gap:16px;">
        <div class="toggle-field">
          <label style="font-size:14px;color:var(--dim)">Già uscito:</label>
          <button class="toggle-btn no" id="video-out" onclick="toggleBtn(this)">NO</button>
        </div>
        <div class="toggle-field">
          <label style="font-size:14px;color:var(--dim)">Wishlist ⭐:</label>
          <button class="toggle-btn no" id="video-wish" onclick="toggleBtn(this)">NO</button>
        </div>
        <div class="form-group" style="min-width:130px;flex:0;">
          <label>Priorità</label>
          <select id="video-priority">
            <option value="alta">🔴 Alta</option>
            <option value="media" selected>🟡 Media</option>
            <option value="bassa">🟢 Bassa</option>
          </select>
        </div>
        <button class="pixel-btn btn-add" onclick="addGame('video')" style="margin-top:18px;">+ AGGIUNGI</button>
      </div>
    </div>
    <div class="filter-bar">
      <label>FILTRO:</label>
      <button class="filter-btn active" onclick="setFilter('video','all',this)">TUTTI</button>
      <button class="filter-btn" onclick="setFilter('video','out',this)">USCITI</button>
      <button class="filter-btn" onclick="setFilter('video','incoming',this)">IN ARRIVO</button>
      <button class="filter-btn" onclick="setFilter('video','wish',this)">⭐ WISH</button>
    </div>
    <div class="game-list" id="list-video"></div>
  </section>

  <!-- ALTRO -->
  <section class="section" id="sec-other">
    <div class="section-header">
      <span class="section-title">📦 ALTRO</span>
      <span class="section-count" id="count-other">0</span>
    </div>
    <div class="add-form">
      <div class="add-form-title">▶ AGGIUNGI VOCE</div>
      <div class="form-row">
        <div class="form-group" style="flex:2;min-width:200px;">
          <label>Nome</label>
          <input type="text" id="other-name" placeholder="es. Manga, Gadget..." onkeydown="if(event.key==='Enter')addGame('other')">
        </div>
        <div class="form-group">
          <label>Categoria</label>
          <input type="text" id="other-cat" placeholder="es. Libro, Gadget...">
        </div>
        <div class="form-group">
          <label>📅 Data esatta (per countdown)</label>
          <input type="date" id="other-date">
        </div>
        <div class="form-group">
          <label>📝 Uscita generica (se non c'è data)</label>
          <input type="text" id="other-datetext" placeholder="es. 2026, Estate 2027, TBA...">
        </div>
        <div class="form-group">
          <label>Prezzo (€)</label>
          <input type="number" id="other-price" placeholder="0.00" min="0" step="0.01">
        </div>
      </div>
      <div class="form-row" style="align-items:center;gap:16px;">
        <div class="toggle-field">
          <label style="font-size:14px;color:var(--dim)">Già uscito:</label>
          <button class="toggle-btn no" id="other-out" onclick="toggleBtn(this)">NO</button>
        </div>
        <div class="toggle-field">
          <label style="font-size:14px;color:var(--dim)">Wishlist ⭐:</label>
          <button class="toggle-btn no" id="other-wish" onclick="toggleBtn(this)">NO</button>
        </div>
        <div class="form-group" style="min-width:130px;flex:0;">
          <label>Priorità</label>
          <select id="other-priority">
            <option value="alta">🔴 Alta</option>
            <option value="media" selected>🟡 Media</option>
            <option value="bassa">🟢 Bassa</option>
          </select>
        </div>
        <button class="pixel-btn btn-add" onclick="addGame('other')" style="margin-top:18px;">+ AGGIUNGI</button>
      </div>
    </div>
    <div class="filter-bar">
      <label>FILTRO:</label>
      <button class="filter-btn active" onclick="setFilter('other','all',this)">TUTTI</button>
      <button class="filter-btn" onclick="setFilter('other','out',this)">USCITI</button>
      <button class="filter-btn" onclick="setFilter('other','incoming',this)">IN ARRIVO</button>
      <button class="filter-btn" onclick="setFilter('other','wish',this)">⭐ WISH</button>
    </div>
    <div class="game-list" id="list-other"></div>
  </section>

  <!-- GESTIONE -->
  <section class="section" id="sec-manage">
    <div class="section-header">
      <span class="section-title">⚙️ GESTIONE</span>
      <span class="section-count" id="count-manage">0</span>
    </div>
    <div class="add-form">
      <div class="add-form-title">▶ AGGIUNGI ALLA GESTIONE</div>
      <div class="form-row">
        <div class="form-group" style="flex:2;min-width:200px;">
          <label>Nome Gioco (scrivi o scegli)</label>
          <input type="text" id="manage-name" list="manage-datalist" placeholder="Scrivi o scegli dalla lista...">
          <datalist id="manage-datalist"></datalist>
        </div>
        <div class="form-group" style="min-width:150px;flex:0;">
          <label>Ci sto giocando</label>
          <button class="toggle-btn no" id="manage-playing" onclick="toggleBtn(this)">NO</button>
        </div>
        <div class="form-group" style="flex:1;min-width:160px;">
          <label>Quando giocare</label>
          <input type="text" id="manage-when" placeholder="es. weekend, sera...">
        </div>
        <button class="pixel-btn btn-manage" onclick="addManage()" style="margin-top:18px;">+ AGGIUNGI</button>
      </div>
    </div>
    <div class="game-list" id="list-manage"></div>
  </section>

  <!-- NOTE -->
  <section class="section" id="sec-notes">
    <div class="section-header">
      <span class="section-title">📝 NOTE</span>
      <button class="pixel-btn btn-add" onclick="addNote()" style="margin-left:auto;">+ NUOVA NOTA</button>
    </div>
    <div id="list-notes"></div>
  </section>

<div id="toast"></div>

<script>
let data = { board:[], video:[], other:[], manage:[], notes:[] };
let filters = { board:'all', video:'all', other:'all' };

function save() { localStorage.setItem('nikyGameTracker', JSON.stringify(data)); }

function load() {
  const raw = localStorage.getItem('nikyGameTracker');
  if (raw) { try { data = JSON.parse(raw); } catch(e){} }
  ['board','video','other','manage','notes'].forEach(k => { if (!data[k]) data[k] = []; });
}

load();
renderAll();

function renderAll() {
  renderGames('board'); renderGames('video'); renderGames('other');
  renderManage(); renderNotes(); updateStats(); updateDatalist();
}

function switchTab(tab, btn) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('sec-'+tab).classList.add('active');
  btn.classList.add('active');
}

function toggleBtn(btn) {
  const isNo = btn.textContent.trim() === 'NO';
  btn.textContent = isNo ? 'SÌ' : 'NO';
  btn.classList.toggle('yes', isNo);
  btn.classList.toggle('no', !isNo);
}

function getBtnVal(id) {
  const b = document.getElementById(id);
  return b && b.textContent.trim() === 'SÌ';
}

function resetBtn(id) {
  const b = document.getElementById(id);
  if (b) { b.textContent='NO'; b.classList.remove('yes'); b.classList.add('no'); }
}

function addGame(cat) {
  const nameEl = document.getElementById(cat+'-name');
  const name = nameEl.value.trim();
  if (!name) { showToast('⚠ Inserisci il nome!', true); return; }
  data[cat].push({
    id: Date.now(), name,
    out:      getBtnVal(cat+'-out'),
    wish:     getBtnVal(cat+'-wish'),
    date:     document.getElementById(cat+'-date')?.value.trim() || '',
    datetext: document.getElementById(cat+'-datetext')?.value.trim() || '',
    price:    parseFloat(document.getElementById(cat+'-price')?.value) || 0,
    priority: document.getElementById(cat+'-priority')?.value || 'media',
    platform: cat==='video' ? (document.getElementById('video-platform')?.value||'') : '',
    subcat:   cat==='other' ? (document.getElementById('other-cat')?.value.trim()||'') : '',
  });
  save();
  nameEl.value='';
  if (document.getElementById(cat+'-date'))     document.getElementById(cat+'-date').value='';
  if (document.getElementById(cat+'-datetext')) document.getElementById(cat+'-datetext').value='';
  if (document.getElementById(cat+'-price'))    document.getElementById(cat+'-price').value='';
  if (cat==='other') document.getElementById('other-cat').value='';
  if (cat==='video') document.getElementById('video-platform').value='PC';
  resetBtn(cat+'-out'); resetBtn(cat+'-wish');
  document.getElementById(cat+'-priority').value='media';
  renderGames(cat); updateStats(); updateDatalist();
  showToast('✔ '+name+' aggiunto!');
}

function deleteGame(cat, id) {
  data[cat] = data[cat].filter(g => g.id !== id);
  save(); renderGames(cat); updateStats(); updateDatalist();
  showToast('🗑 Eliminato!');
}

function toggleWish(cat, id) {
  const g = data[cat].find(g => g.id===id);
  if (g) { g.wish=!g.wish; save(); renderGames(cat); }
}

function renderGames(cat) {
  const list = document.getElementById('list-'+cat);
  const f = filters[cat]||'all';
  let items = data[cat].slice();
  if (f==='out')      items = items.filter(g=>g.out);
  if (f==='incoming') items = items.filter(g=>!g.out);
  if (f==='wish')     items = items.filter(g=>g.wish);
  const po = {alta:0,media:1,bassa:2};
  items.sort((a,b)=>(po[a.priority]||1)-(po[b.priority]||1)||a.name.localeCompare(b.name));
  document.getElementById('count-'+cat).textContent = data[cat].length;
  if (!items.length) {
    list.innerHTML=`<div class="empty-state"><span class="pix">${cat==='board'?'🎲':cat==='video'?'🕹️':'📦'}</span><p>Nessun gioco qui... per ora!</p></div>`;
    return;
  }
  const pri = {alta:'🔴',media:'🟡',bassa:'🟢'};
  list.innerHTML = items.map(g => {
    const dateStr = g.date
      ? `<span class="date-tag">📅 ${formatDate(g.date)}</span>${getCountdown(g.date)}`
      : g.datetext
        ? `<span class="date-tag">📅 ${esc(g.datetext)}</span>`
        : '';
    const priceStr = g.price ? `<span class="price-tag">💶 ${g.price.toFixed(2)}€</span>` : '';
    const platStr  = g.platform ? `<span style="color:var(--purple);font-size:15px;">🖥️ ${g.platform}</span>` : '';
    const subcatStr= g.subcat   ? `<span style="color:var(--orange);font-size:15px;">[${esc(g.subcat)}]</span>` : '';
    const outBadge = g.out
      ? `<span class="badge badge-out-yes">USCITO</span>`
      : `<span class="badge badge-out-no">IN ARRIVO</span>`;
    const star = `<span class="wishlist-star ${g.wish?'active':''}" onclick="toggleWish('${cat}',${g.id})">⭐</span>`;
    const platOpts = ['PC','PS5','PS4','Xbox','Switch','Mobile','Altro'].map(p=>`<option${g.platform===p?' selected':''}>${p}</option>`).join('');
    const editForm = `<div class="edit-form" id="edit-${cat}-${g.id}">
      <div class="form-group" style="min-width:160px;flex:2;">
        <label>Nome</label>
        <input type="text" id="ef-name-${g.id}" value="${esc(g.name)}">
      </div>
      ${cat==='video'?`<div class="form-group" style="min-width:110px;flex:0;"><label>Piattaforma</label><select id="ef-platform-${g.id}">${platOpts}</select></div>`:''}
      ${cat==='other'?`<div class="form-group" style="min-width:110px;flex:1;"><label>Categoria</label><input type="text" id="ef-subcat-${g.id}" value="${esc(g.subcat||'')}"></div>`:''}
      <div class="form-group" style="min-width:140px;flex:1;">
        <label>📅 Data esatta</label>
        <input type="date" id="ef-date-${g.id}" value="${esc(g.date||'')}">
      </div>
      <div class="form-group" style="min-width:130px;flex:1;">
        <label>📝 Uscita generica</label>
        <input type="text" id="ef-datetext-${g.id}" value="${esc(g.datetext||'')}" placeholder="es. 2026, TBA...">
      </div>
      <div class="form-group" style="min-width:90px;flex:0;">
        <label>Prezzo €</label>
        <input type="number" id="ef-price-${g.id}" value="${g.price||''}" min="0" step="0.01">
      </div>
      <div class="form-group" style="min-width:110px;flex:0;">
        <label>Priorità</label>
        <select id="ef-priority-${g.id}">
          <option value="alta"${g.priority==='alta'?' selected':''}>🔴 Alta</option>
          <option value="media"${g.priority==='media'?' selected':''}>🟡 Media</option>
          <option value="bassa"${g.priority==='bassa'?' selected':''}>🟢 Bassa</option>
        </select>
      </div>
      <div class="form-group" style="min-width:90px;flex:0;">
        <label>Già uscito</label>
        <button class="toggle-btn ${g.out?'yes':'no'}" id="ef-out-${g.id}" onclick="toggleBtn(this)">${g.out?'SÌ':'NO'}</button>
      </div>
      <div class="form-group" style="min-width:80px;flex:0;">
        <label>Wishlist</label>
        <button class="toggle-btn ${g.wish?'yes':'no'}" id="ef-wish-${g.id}" onclick="toggleBtn(this)">${g.wish?'SÌ':'NO'}</button>
      </div>
      <div style="display:flex;gap:8px;align-items:flex-end;padding-bottom:2px;">
        <button class="pixel-btn btn-add" style="font-size:8px;padding:8px 12px;" onclick="saveEdit('${cat}',${g.id})">💾 SALVA</button>
        <button class="pixel-btn btn-delete" onclick="cancelEdit('${cat}',${g.id})">✕</button>
      </div>
    </div>`;
    return `<div class="game-card cat-${cat}" style="flex-wrap:wrap;">
      <span style="font-size:20px;">${pri[g.priority]||''}</span>
      <div class="game-name">${esc(g.name)}</div>
      <div class="game-meta">${platStr}${subcatStr}${dateStr}${priceStr}</div>
      ${outBadge}${star}
      <button class="pixel-btn btn-edit" onclick="toggleEditForm('${cat}',${g.id})">✏️ EDIT</button>
      <button class="pixel-btn btn-delete" onclick="deleteGame('${cat}',${g.id})">✕ DEL</button>
      ${editForm}
    </div>`;
  }).join('');
}

function toggleEditForm(cat, id) {
  const el = document.getElementById(`edit-${cat}-${id}`);
  if (el) el.classList.toggle('open');
}

function cancelEdit(cat, id) {
  const el = document.getElementById(`edit-${cat}-${id}`);
  if (el) el.classList.remove('open');
}

function saveEdit(cat, id) {
  const g = data[cat].find(g=>g.id===id);
  if (!g) return;
  const name = document.getElementById(`ef-name-${id}`)?.value.trim();
  if (!name) { showToast('⚠ Il nome non può essere vuoto!', true); return; }
  g.name     = name;
  g.date     = document.getElementById(`ef-date-${id}`)?.value.trim() || '';
  g.datetext = document.getElementById(`ef-datetext-${id}`)?.value.trim() || '';
  g.price    = parseFloat(document.getElementById(`ef-price-${id}`)?.value) || 0;
  g.priority = document.getElementById(`ef-priority-${id}`)?.value || 'media';
  const outBtn  = document.getElementById(`ef-out-${id}`);
  const wishBtn = document.getElementById(`ef-wish-${id}`);
  g.out  = outBtn  ? outBtn.textContent.trim()==='SÌ'  : g.out;
  g.wish = wishBtn ? wishBtn.textContent.trim()==='SÌ' : g.wish;
  if (cat==='video') g.platform = document.getElementById(`ef-platform-${id}`)?.value || g.platform;
  if (cat==='other') g.subcat   = document.getElementById(`ef-subcat-${id}`)?.value.trim() || '';
  save(); renderGames(cat); updateDatalist();
  showToast('✔ Modifiche salvate!');
}


  filters[cat]=val;
  btn.closest('.filter-bar').querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderGames(cat);
}

function addManage() {
  const nameEl = document.getElementById('manage-name');
  const name = nameEl.value.trim();
  if (!name) { showToast('⚠ Inserisci il nome!', true); return; }
  data.manage.push({
    id: Date.now(), name,
    playing: getBtnVal('manage-playing'),
    when: document.getElementById('manage-when').value.trim(),
  });
  save();
  nameEl.value=''; document.getElementById('manage-when').value='';
  resetBtn('manage-playing');
  renderManage(); updateStats();
  showToast('✔ '+name+' in gestione!');
}

function deleteManage(id) {
  data.manage = data.manage.filter(g=>g.id!==id);
  save(); renderManage(); updateStats();
  showToast('🗑 Eliminato!');
}

function toggleManagePlaying(id) {
  const g = data.manage.find(g=>g.id===id);
  if (g) { g.playing=!g.playing; save(); renderManage(); }
}

function renderManage() {
  const list = document.getElementById('list-manage');
  document.getElementById('count-manage').textContent = data.manage.length;
  if (!data.manage.length) {
    list.innerHTML=`<div class="empty-state"><span class="pix">⚙️</span><p>Nessun gioco in gestione!</p></div>`;
    return;
  }
  const items = [...data.manage].sort((a,b)=>(b.playing?1:0)-(a.playing?1:0));
  list.innerHTML = items.map(g => {
    const badge = g.playing
      ? `<span class="badge badge-playing">▶ CI STO GIOCANDO</span>`
      : `<span class="badge" style="background:var(--panel2);color:var(--dim);font-family:'Press Start 2P';font-size:7px;padding:4px 8px;">⏸ IN PAUSA</span>`;
    const when = g.when ? `<span class="when-tag">⏰ ${esc(g.when)}</span>` : '';
    const editManageForm = `<div class="edit-form" id="edit-manage-${g.id}">
      <div class="form-group" style="min-width:160px;flex:2;">
        <label>Nome</label>
        <input type="text" id="em-name-${g.id}" value="${esc(g.name)}" list="manage-datalist">
      </div>
      <div class="form-group" style="min-width:160px;flex:1;">
        <label>Quando giocare</label>
        <input type="text" id="em-when-${g.id}" value="${esc(g.when||'')}" placeholder="es. weekend, sera...">
      </div>
      <div class="form-group" style="min-width:100px;flex:0;">
        <label>Ci sto giocando</label>
        <button class="toggle-btn ${g.playing?'yes':'no'}" id="em-playing-${g.id}" onclick="toggleBtn(this)">${g.playing?'SÌ':'NO'}</button>
      </div>
      <div style="display:flex;gap:8px;align-items:flex-end;padding-bottom:2px;">
        <button class="pixel-btn btn-add" style="font-size:8px;padding:8px 12px;" onclick="saveManageEdit(${g.id})">💾 SALVA</button>
        <button class="pixel-btn btn-delete" onclick="cancelManageEdit(${g.id})">✕</button>
      </div>
    </div>`;
    return `<div class="manage-card" style="flex-wrap:wrap;">
      <div class="manage-name">${esc(g.name)}</div>
      ${when}
      <span onclick="toggleManagePlaying(${g.id})" style="cursor:pointer;">${badge}</span>
      <button class="pixel-btn btn-edit" onclick="toggleManageEditForm(${g.id})">✏️ EDIT</button>
      <button class="pixel-btn btn-delete" onclick="deleteManage(${g.id})">✕ DEL</button>
      ${editManageForm}
    </div>`;
  }).join('');
}

function toggleManageEditForm(id) {
  const el = document.getElementById(`edit-manage-${id}`);
  if (el) el.classList.toggle('open');
}

function cancelManageEdit(id) {
  const el = document.getElementById(`edit-manage-${id}`);
  if (el) el.classList.remove('open');
}

function saveManageEdit(id) {
  const g = data.manage.find(g=>g.id===id);
  if (!g) return;
  const name = document.getElementById(`em-name-${id}`)?.value.trim();
  if (!name) { showToast('⚠ Il nome non può essere vuoto!', true); return; }
  g.name    = name;
  g.when    = document.getElementById(`em-when-${id}`)?.value.trim() || '';
  const pb  = document.getElementById(`em-playing-${id}`);
  g.playing = pb ? pb.textContent.trim()==='SÌ' : g.playing;
  save(); renderManage();
  showToast('✔ Modifiche salvate!');
}


  const dl = document.getElementById('manage-datalist');
  if (!dl) return;
  const all = [...new Set([...data.board,...data.video,...data.other].map(g=>g.name))].sort();
  dl.innerHTML = all.map(n=>`<option value="${esc(n)}">`).join('');
}

function addNote() { data.notes.push({id:Date.now(),text:''}); save(); renderNotes(); }

function deleteNote(id) {
  data.notes = data.notes.filter(n=>n.id!==id);
  save(); renderNotes(); showToast('🗑 Nota eliminata!');
}

function updateNote(id, val) {
  const n = data.notes.find(n=>n.id===id);
  if (n) { n.text=val; save(); }
}

function renderNotes() {
  const list = document.getElementById('list-notes');
  if (!data.notes.length) {
    list.innerHTML=`<div class="empty-state"><span class="pix">📝</span><p>Nessuna nota. Clicca + NUOVA NOTA!</p></div>`;
    return;
  }
  list.innerHTML = data.notes.map((n,i)=>`
    <div class="note-card">
      <div class="note-num">#${String(i+1).padStart(2,'0')}</div>
      <textarea class="note-text" rows="3" oninput="updateNote(${n.id},this.value)" placeholder="Scrivi qui...">${esc(n.text)}</textarea>
      <button class="pixel-btn btn-delete" onclick="deleteNote(${n.id})">✕</button>
    </div>`).join('');
}

function updateStats() {
  document.getElementById('sc-board').textContent  = data.board.length;
  document.getElementById('sc-video').textContent  = data.video.length;
  document.getElementById('sc-other').textContent  = data.other.length;
  document.getElementById('sc-manage').textContent = data.manage.length;
}

function formatDate(d) {
  if (!d) return '';
  const iso = d.match(/^(\d{4})-(\d{2})-(\d{2})$/);
  if (iso) return `${iso[3]}/${iso[2]}/${iso[1]}`;
  return d;
}

function getCountdown(d) {
  if (!d) return '';
  if (!d.match(/^(\d{4})-(\d{2})-(\d{2})$/)) return '';
  const target = new Date(d); target.setHours(0,0,0,0);
  const today  = new Date(); today.setHours(0,0,0,0);
  const diff = Math.round((target-today)/(86400000));
  if (diff===0)   return `<span class="countdown-today">★ OGGI!</span>`;
  if (diff>0)     return `<span class="countdown-future">⏳ ${diff} gg</span>`;
  if (diff>=-30)  return `<span class="countdown-recent">✔ ${Math.abs(diff)} gg fa</span>`;
  return '';
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function exportData() {
  const blob = new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `niky-game-tracker-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  showToast('💾 Backup salvato!');
}

function importData(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const parsed = JSON.parse(ev.target.result);
      if (!['board','video','other','manage','notes'].every(k=>Array.isArray(parsed[k]))) {
        showToast('⚠ File non valido!', true); return;
      }
      if (!confirm(`Importare il backup?\nSovrascrive i dati attuali.\n🎲 ${parsed.board.length}  🕹️ ${parsed.video.length}  📦 ${parsed.other.length}`)) return;
      data = parsed; save(); renderAll();
      showToast('✔ Dati importati!');
    } catch { showToast('⚠ Errore lettura file!', true); }
    e.target.value='';
  };
  reader.readAsText(file);
}

function showToast(msg, isError=false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'show' + (isError?' error':'');
  clearTimeout(t._t);
  t._t = setTimeout(()=>{ t.className=''; }, 2200);
}
</script>

if ('serviceWorker' in navigator) {
  const sw = `const C='niky-v1',A=['./index.html','./manifest.json','./icon-192.png','./icon-512.png'];
self.addEventListener('install',e=>e.waitUntil(caches.open(C).then(c=>c.addAll(A))));
self.addEventListener('fetch',e=>e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request))));`;
  const url = URL.createObjectURL(new Blob([sw],{type:'application/javascript'}));
  navigator.serviceWorker.register(url).catch(()=>{});
}
