<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎮 NIKY'S GAME TRACKER</title>
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./icon-192.png">
<link rel="icon" type="image/png" sizes="192x192" href="./icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="./icon-512.png">
<meta name="theme-color" content="#00e5ff">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323:wght@400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #0d0d1a;
    --bg2:       #13132b;
    --panel:     #1a1a3e;
    --panel2:    #21214f;
    --border:    #4040a0;
    --border2:   #6060d0;
    --cyan:      #00e5ff;
    --pink:      #ff2d78;
    --yellow:    #ffe600;
    --green:     #00ff88;
    --purple:    #b44dff;
    --orange:    #ff8800;
    --text:      #e8e8ff;
    --text-dim:  #8888cc;
    --shadow:    #000033;
    --pixel:     4px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'VT323', monospace;
    font-size: 20px;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* === PIXEL SCANLINES === */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.08) 2px,
      rgba(0,0,0,0.08) 4px
    );
    pointer-events: none;
    z-index: 9999;
  }

  /* === HEADER === */
  header {
    background: var(--bg2);
    border-bottom: 4px solid var(--cyan);
    padding: 18px 24px 12px;
    display: flex;
    align-items: center;
    gap: 18px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 4px 0 var(--shadow);
  }

  .header-sprite {
    font-size: 36px;
    animation: bounce 1s steps(2) infinite;
    display: inline-block;
  }

  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50%       { transform: translateY(-6px); }
  }

  header h1 {
    font-family: 'Press Start 2P', monospace;
    font-size: clamp(10px, 2.5vw, 16px);
    color: var(--cyan);
    text-shadow: 3px 3px 0 var(--pink), 6px 6px 0 rgba(0,229,255,0.15);
    letter-spacing: 1px;
    line-height: 1.5;
  }

  .header-stats {
    margin-left: auto;
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
  }

  .stat-chip {
    background: var(--panel);
    border: 2px solid var(--border);
    padding: 4px 10px;
    font-size: 15px;
    color: var(--text-dim);
    white-space: nowrap;
    image-rendering: pixelated;
  }

  .stat-chip span { color: var(--yellow); }

  /* === NAV TABS === */
  nav {
    display: flex;
    background: var(--bg2);
    border-bottom: 4px solid var(--border);
    overflow-x: auto;
    scrollbar-width: none;
  }
  nav::-webkit-scrollbar { display: none; }

  .tab-btn {
    font-family: 'Press Start 2P', monospace;
    font-size: 9px;
    padding: 14px 18px;
    background: transparent;
    color: var(--text-dim);
    border: none;
    border-right: 2px solid var(--border);
    cursor: pointer;
    white-space: nowrap;
    transition: color 0.1s, background 0.1s;
    position: relative;
    letter-spacing: 0.5px;
  }

  .tab-btn:hover { color: var(--text); background: var(--panel); }

  .tab-btn.active {
    color: var(--yellow);
    background: var(--panel);
  }

  .tab-btn.active::after {
    content: '';
    position: absolute;
    bottom: -4px; left: 0; right: 0;
    height: 4px;
    background: var(--yellow);
  }

  .tab-icon { margin-right: 6px; font-size: 14px; }

  /* === MAIN === */
  main { padding: 24px 20px; max-width: 960px; margin: 0 auto; }

  .section { display: none; }
  .section.active { display: block; }

  /* === SECTION HEADER === */
  .section-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
    border-bottom: 3px solid var(--border);
    padding-bottom: 12px;
  }

  .section-title {
    font-family: 'Press Start 2P', monospace;
    font-size: 12px;
    color: var(--cyan);
  }

  .section-count {
    background: var(--pink);
    color: #fff;
    font-size: 14px;
    padding: 2px 8px;
    margin-left: auto;
  }

  /* === ADD FORM === */
  .add-form {
    background: var(--panel);
    border: 3px solid var(--border);
    padding: 18px;
    margin-bottom: 24px;
    display: grid;
    gap: 12px;
  }

  .add-form-title {
    font-family: 'Press Start 2P', monospace;
    font-size: 9px;
    color: var(--green);
    margin-bottom: 4px;
  }

  .form-row {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    align-items: flex-end;
  }

  .form-group {
    display: flex;
    flex-direction: column;
    gap: 5px;
    flex: 1;
    min-width: 140px;
  }

  .form-group label {
    font-size: 14px;
    color: var(--text-dim);
  }

  input[type="text"],
  input[type="date"],
  input[type="number"],
  input[type="search"],
  select,
  textarea {
    background: var(--bg);
    border: 2px solid var(--border);
    color: var(--text);
    font-family: 'VT323', monospace;
    font-size: 18px;
    padding: 6px 10px;
    outline: none;
    width: 100%;
    transition: border-color 0.15s;
  }

  input:focus, select:focus, textarea:focus {
    border-color: var(--cyan);
    box-shadow: 0 0 0 2px rgba(0,229,255,0.15);
  }

  select option { background: var(--bg); }

  /* === TOGGLE YES/NO === */
  .toggle-field {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .toggle-btn {
    font-family: 'Press Start 2P', monospace;
    font-size: 8px;
    padding: 7px 12px;
    border: 2px solid var(--border);
    background: var(--bg);
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.1s;
    min-width: 60px;
    text-align: center;
  }

  .toggle-btn.yes {
    background: rgba(0,255,136,0.12);
    border-color: var(--green);
    color: var(--green);
  }

  .toggle-btn.no {
    background: rgba(255,45,120,0.12);
    border-color: var(--pink);
    color: var(--pink);
  }

  /* === PIXEL BUTTON === */
  .pixel-btn {
    font-family: 'Press Start 2P', monospace;
    font-size: 9px;
    padding: 10px 16px;
    border: none;
    cursor: pointer;
    transition: transform 0.05s, filter 0.05s;
    letter-spacing: 0.5px;
    white-space: nowrap;
  }

  .pixel-btn:active { transform: translate(2px,2px); filter: brightness(0.85); }

  .btn-add {
    background: var(--green);
    color: var(--bg);
    box-shadow: 4px 4px 0 #008844;
  }

  .btn-delete {
    background: var(--pink);
    color: #fff;
    box-shadow: 3px 3px 0 #880022;
    font-size: 8px;
    padding: 7px 10px;
  }

  .btn-manage {
    background: var(--purple);
    color: #fff;
    box-shadow: 4px 4px 0 #660099;
  }

  /* === GAME LIST === */
  .game-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .game-card {
    background: var(--panel);
    border: 2px solid var(--border);
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
    transition: border-color 0.1s, background 0.1s;
    position: relative;
    overflow: hidden;
  }

  .game-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 4px;
  }

  .game-card.cat-board::before  { background: var(--orange); }
  .game-card.cat-video::before  { background: var(--cyan); }
  .game-card.cat-other::before  { background: var(--purple); }

  .game-card:hover { border-color: var(--border2); background: var(--panel2); }

  .game-name {
    font-size: 20px;
    color: var(--text);
    flex: 1;
    min-width: 100px;
  }

  .badge {
    font-family: 'Press Start 2P', monospace;
    font-size: 7px;
    padding: 4px 8px;
    white-space: nowrap;
  }

  .badge-out-yes  { background: var(--green);  color: var(--bg); }
  .badge-out-no   { background: var(--pink);   color: #fff; }
  .badge-playing  { background: var(--yellow); color: var(--bg); animation: blink 1.2s steps(1) infinite; }
  .badge-waitlist { background: var(--purple); color: #fff; }

  @keyframes blink { 50% { opacity: 0.4; } }

  .game-meta {
    font-size: 16px;
    color: var(--text-dim);
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    align-items: center;
  }

  .price-tag {
    color: var(--yellow);
    font-size: 17px;
  }

  .date-tag { color: var(--cyan); }

  .countdown-today  { font-family: 'Press Start 2P', monospace; font-size: 7px; padding: 3px 7px; background: var(--yellow); color: var(--bg); animation: blink 1s steps(1) infinite; }
  .countdown-future { font-family: 'Press Start 2P', monospace; font-size: 7px; padding: 3px 7px; background: rgba(0,229,255,0.15); color: var(--cyan); border: 1px solid var(--cyan); }
  .countdown-recent { font-family: 'Press Start 2P', monospace; font-size: 7px; padding: 3px 7px; background: rgba(0,255,136,0.12); color: var(--green); border: 1px solid var(--green); }

  /* === EMPTY STATE === */
  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--text-dim);
    border: 2px dashed var(--border);
  }

  .empty-state .pixel-icon { font-size: 48px; margin-bottom: 12px; display: block; }
  .empty-state p { font-size: 16px; }

  /* === MANAGEMENT SECTION === */
  .manage-card {
    background: var(--panel);
    border: 2px solid var(--border);
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
    margin-bottom: 10px;
  }

  .manage-name {
    font-size: 20px;
    flex: 1;
    min-width: 120px;
  }

  .when-tag {
    font-size: 16px;
    color: var(--orange);
    background: rgba(255,136,0,0.12);
    border: 1px solid var(--orange);
    padding: 2px 8px;
  }

  /* === NOTES SECTION === */
  .note-card {
    background: var(--panel);
    border: 2px solid var(--border);
    padding: 14px;
    margin-bottom: 12px;
    display: flex;
    gap: 12px;
    align-items: flex-start;
  }

  .note-number {
    font-family: 'Press Start 2P', monospace;
    font-size: 10px;
    color: var(--purple);
    min-width: 28px;
    padding-top: 6px;
  }

  textarea.note-text {
    background: var(--bg);
    border: 2px solid var(--border);
    color: var(--text);
    font-family: 'VT323', monospace;
    font-size: 19px;
    padding: 8px;
    resize: vertical;
    min-height: 70px;
    flex: 1;
  }

  textarea.note-text:focus { border-color: var(--purple); }

  /* === FILTER BAR === */
  .filter-bar {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
    flex-wrap: wrap;
    align-items: center;
  }

  .filter-bar label { font-size: 14px; color: var(--text-dim); }

  .filter-btn {
    font-family: 'Press Start 2P', monospace;
    font-size: 8px;
    padding: 6px 10px;
    background: var(--bg);
    border: 2px solid var(--border);
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.1s;
  }

  .filter-btn.active {
    background: var(--panel2);
    border-color: var(--cyan);
    color: var(--cyan);
  }

  /* === WISHLIST INDICATOR === */
  .wishlist-star {
    cursor: pointer;
    font-size: 18px;
    transition: transform 0.1s;
    color: var(--text-dim);
  }
  .wishlist-star.active { color: var(--yellow); }
  .wishlist-star:hover { transform: scale(1.3); }

  /* === RESPONSIVE === */
  @media (max-width: 600px) {
    header { flex-wrap: wrap; gap: 10px; }
    .header-stats { margin-left: 0; width: 100%; }
    .tab-btn { font-size: 7px; padding: 12px 12px; }
    main { padding: 16px 12px; }
    .form-row { flex-direction: column; }
    .form-group { min-width: unset; }
  }

  /* === PIXEL DIVIDER === */
  .pixel-divider {
    border: none;
    border-top: 4px dashed var(--border);
    margin: 20px 0;
    opacity: 0.5;
  }

  /* === PRIORITY BADGE === */
  .priority-high { color: var(--pink); }
  .priority-med  { color: var(--yellow); }
  .priority-low  { color: var(--green); }

  /* === TOAST === */
  #toast {
    position: fixed;
    bottom: 24px; right: 24px;
    background: var(--green);
    color: var(--bg);
    font-family: 'Press Start 2P', monospace;
    font-size: 9px;
    padding: 12px 18px;
    box-shadow: 6px 6px 0 rgba(0,0,0,0.5);
    z-index: 9000;
    transform: translateY(100px);
    opacity: 0;
    transition: transform 0.2s, opacity 0.2s;
    max-width: 280px;
  }

  #toast.show { transform: translateY(0); opacity: 1; }
  #toast.error { background: var(--pink); color: #fff; }

  /* === SCROLLBAR === */
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); }
  ::-webkit-scrollbar-thumb:hover { background: var(--border2); }
</style>
</head>
<body>

<header>
  <span class="header-sprite">👾</span>
  <h1>NIKY'S<br>GAME TRACKER</h1>
  <div class="header-stats" id="globalStats">
    <div class="stat-chip">🎲 Tavolo: <span id="sc-board">0</span></div>
    <div class="stat-chip">🕹️ Video: <span id="sc-video">0</span></div>
    <div class="stat-chip">📦 Altro: <span id="sc-other">0</span></div>
    <div class="stat-chip">⚡ Gestione: <span id="sc-manage">0</span></div>
  </div>
</header>

<nav id="mainNav">
  <button class="tab-btn active" data-tab="board" onclick="switchTab('board',this)">
    <span class="tab-icon">🎲</span>TAVOLO
  </button>
  <button class="tab-btn" data-tab="video" onclick="switchTab('video',this)">
    <span class="tab-icon">🕹️</span>VIDEOGIOCHI
  </button>
  <button class="tab-btn" data-tab="other" onclick="switchTab('other',this)">
    <span class="tab-icon">📦</span>ALTRO
  </button>
  <button class="tab-btn" data-tab="manage" onclick="switchTab('manage',this)">
    <span class="tab-icon">⚙️</span>GESTIONE
  </button>
  <button class="tab-btn" data-tab="notes" onclick="switchTab('notes',this)">
    <span class="tab-icon">📝</span>NOTE
  </button>
</nav>

<main>

  <!-- ===== BOARD GAMES ===== -->
  <section class="section active" id="sec-board">
    <div class="section-header">
      <span class="section-title">🎲 GIOCHI DA TAVOLO</span>
      <span class="section-count" id="count-board">0</span>
    </div>

    <div class="add-form">
      <div class="add-form-title">▶ AGGIUNGI GIOCO</div>
      <div class="form-row">
        <div class="form-group" style="flex:2; min-width:200px;">
          <label>Nome Gioco</label>
          <input type="text" id="board-name" placeholder="es. Gloomhaven..." onkeydown="if(event.key==='Enter')addGame('board')">
        </div>
        <div class="form-group">
          <label>Uscita Prevista</label>
          <input type="text" id="board-date" placeholder="es. 2026, Estate 2027...">
        </div>
        <div class="form-group">
          <label>Prezzo (€)</label>
          <input type="number" id="board-price" placeholder="0.00" min="0" step="0.01">
        </div>
      </div>
      <div class="form-row" style="align-items:center; gap:16px; flex-wrap:wrap;">
        <div class="toggle-field">
          <label style="font-size:14px; color:var(--text-dim)">Già uscito:</label>
          <button class="toggle-btn no" id="board-out" onclick="toggleBtn(this)">NO</button>
        </div>
        <div class="toggle-field">
          <label style="font-size:14px; color:var(--text-dim)">Wishlist ⭐:</label>
          <button class="toggle-btn no" id="board-wish" onclick="toggleBtn(this)">NO</button>
        </div>
        <div class="form-group" style="min-width:130px; flex:0;">
          <label>Priorità</label>
          <select id="board-priority">
            <option value="alta">🔴 Alta</option>
            <option value="media" selected>🟡 Media</option>
            <option value="bassa">🟢 Bassa</option>
          </select>
        </div>
        <button class="pixel-btn btn-add" onclick="addGame('board')" style="margin-top:18px;">+ AGGIUNGI</button>
      </div>
    </div>

    <div class="filter-bar">
      <label>FILTRO:</label>
      <button class="filter-btn active" onclick="setFilter('board','all',this)">TUTTI</button>
      <button class="filter-btn" onclick="setFilter('board','out',this)">USCITI</button>
      <button class="filter-btn" onclick="setFilter('board','incoming',this)">IN ARRIVO</button>
      <button class="filter-btn" onclick="setFilter('board','wish',this)">⭐ WISH</button>
    </div>

    <div class="game-list" id="list-board"></div>
  </section>

  <!-- ===== VIDEOGIOCHI ===== -->
  <section class="section" id="sec-video">
    <div class="section-header">
      <span class="section-title">🕹️ VIDEOGIOCHI</span>
      <span class="section-count" id="count-video">0</span>
    </div>

    <div class="add-form">
      <div class="add-form-title">▶ AGGIUNGI GIOCO</div>
      <div class="form-row">
        <div class="form-group" style="flex:2; min-width:200px;">
          <label>Nome Gioco</label>
          <input type="text" id="video-name" placeholder="es. Elden Ring 2..." onkeydown="if(event.key==='Enter')addGame('video')">
        </div>
        <div class="form-group">
          <label>Piattaforma</label>
          <select id="video-platform">
            <option>PC</option>
            <option>PS5</option>
            <option>PS4</option>
            <option>Xbox</option>
            <option>Switch</option>
            <option>Mobile</option>
            <option>Altro</option>
          </select>
        </div>
        <div class="form-group">
          <label>Uscita Prevista</label>
          <input type="text" id="video-date" placeholder="es. 2026, Estate 2027...">
        </div>
        <div class="form-group">
          <label>Prezzo (€)</label>
          <input type="number" id="video-price" placeholder="0.00" min="0" step="0.01">
        </div>
      </div>
      <div class="form-row" style="align-items:center; gap:16px; flex-wrap:wrap;">
        <div class="toggle-field">
          <label style="font-size:14px; color:var(--text-dim)">Già uscito:</label>
          <button class="toggle-btn no" id="video-out" onclick="toggleBtn(this)">NO</button>
        </div>
        <div class="toggle-field">
          <label style="font-size:14px; color:var(--text-dim)">Wishlist ⭐:</label>
          <button class="toggle-btn no" id="video-wish" onclick="toggleBtn(this)">NO</button>
        </div>
        <div class="form-group" style="min-width:130px; flex:0;">
          <label>Priorità</label>
          <select id="video-priority">
            <option value="alta">🔴 Alta</option>
            <option value="media" selected>🟡 Media</option>
            <option value="bassa">🟢 Bassa</option>
          </select>
        </div>
        <button class="pixel-btn btn-add" onclick="addGame('video')" style="margin-top:18px;">+ AGGIUNGI</button>
      </div>
    </div>

    <div class="filter-bar">
      <label>FILTRO:</label>
      <button class="filter-btn active" onclick="setFilter('video','all',this)">TUTTI</button>
      <button class="filter-btn" onclick="setFilter('video','out',this)">USCITI</button>
      <button class="filter-btn" onclick="setFilter('video','incoming',this)">IN ARRIVO</button>
      <button class="filter-btn" onclick="setFilter('video','wish',this)">⭐ WISH</button>
    </div>

    <div class="game-list" id="list-video"></div>
  </section>

  <!-- ===== ALTRO ===== -->
  <section class="section" id="sec-other">
    <div class="section-header">
      <span class="section-title">📦 ALTRO</span>
      <span class="section-count" id="count-other">0</span>
    </div>

    <div class="add-form">
      <div class="add-form-title">▶ AGGIUNGI VOCE</div>
      <div class="form-row">
        <div class="form-group" style="flex:2; min-width:200px;">
          <label>Nome</label>
          <input type="text" id="other-name" placeholder="es. Manga, Gadget..." onkeydown="if(event.key==='Enter')addGame('other')">
        </div>
        <div class="form-group">
          <label>Categoria</label>
          <input type="text" id="other-cat" placeholder="es. Libro, Gadget...">
        </div>
        <div class="form-group">
          <label>Uscita Prevista</label>
          <input type="text" id="other-date" placeholder="es. 2026, Estate 2027...">
        </div>
        <div class="form-group">
          <label>Prezzo (€)</label>
          <input type="number" id="other-price" placeholder="0.00" min="0" step="0.01">
        </div>
      </div>
      <div class="form-row" style="align-items:center; gap:16px; flex-wrap:wrap;">
        <div class="toggle-field">
          <label style="font-size:14px; color:var(--text-dim)">Già uscito:</label>
          <button class="toggle-btn no" id="other-out" onclick="toggleBtn(this)">NO</button>
        </div>
        <div class="toggle-field">
          <label style="font-size:14px; color:var(--text-dim)">Wishlist ⭐:</label>
          <button class="toggle-btn no" id="other-wish" onclick="toggleBtn(this)">NO</button>
        </div>
        <div class="form-group" style="min-width:130px; flex:0;">
          <label>Priorità</label>
          <select id="other-priority">
            <option value="alta">🔴 Alta</option>
            <option value="media" selected>🟡 Media</option>
            <option value="bassa">🟢 Bassa</option>
          </select>
        </div>
        <button class="pixel-btn btn-add" onclick="addGame('other')" style="margin-top:18px;">+ AGGIUNGI</button>
      </div>
    </div>

    <div class="filter-bar">
      <label>FILTRO:</label>
      <button class="filter-btn active" onclick="setFilter('other','all',this)">TUTTI</button>
      <button class="filter-btn" onclick="setFilter('other','out',this)">USCITI</button>
      <button class="filter-btn" onclick="setFilter('other','incoming',this)">IN ARRIVO</button>
      <button class="filter-btn" onclick="setFilter('other','wish',this)">⭐ WISH</button>
    </div>

    <div class="game-list" id="list-other"></div>
  </section>

  <!-- ===== GESTIONE ===== -->
  <section class="section" id="sec-manage">
    <div class="section-header">
      <span class="section-title">⚙️ GESTIONE CI STO GIOCANDO</span>
      <span class="section-count" id="count-manage">0</span>
    </div>

    <div class="add-form">
      <div class="add-form-title">▶ AGGIUNGI ALLA GESTIONE</div>
      <div class="form-row">
        <div class="form-group" style="flex:2; min-width:200px;">
          <label>Nome Gioco (scrivi o scegli)</label>
          <input type="text" id="manage-name" list="manage-datalist" placeholder="Scrivi o scegli dalla lista...">
          <datalist id="manage-datalist"></datalist>
        </div>
        <div class="form-group" style="min-width:160px; flex:0;">
          <label>Ci sto giocando</label>
          <button class="toggle-btn no" id="manage-playing" onclick="toggleBtn(this)">NO</button>
        </div>
        <div class="form-group" style="flex:1; min-width:160px;">
          <label>Quando giocare</label>
          <input type="text" id="manage-when" placeholder="es. weekend, sera...">
        </div>
        <button class="pixel-btn btn-manage" onclick="addManage()" style="margin-top:18px;">+ AGGIUNGI</button>
      </div>
    </div>

    <div class="game-list" id="list-manage"></div>
  </section>

  <!-- ===== NOTE ===== -->
  <section class="section" id="sec-notes">
    <div class="section-header">
      <span class="section-title">📝 NOTE</span>
      <button class="pixel-btn btn-add" onclick="addNote()" style="margin-left:auto;">+ NUOVA NOTA</button>
    </div>
    <div id="list-notes"></div>
  </section>

</main>

<div id="toast"></div>

<script>
// ===== DATA =====
let data = {
  board:  [],
  video:  [],
  other:  [],
  manage: [],
  notes:  []
};

let filters = { board: 'all', video: 'all', other: 'all' };

function save() {
  localStorage.setItem('nikyGameTracker', JSON.stringify(data));
}

function load() {
  const raw = localStorage.getItem('nikyGameTracker');
  if (raw) {
    try { data = JSON.parse(raw); } catch(e) {}
  }
  // Ensure arrays exist
  ['board','video','other','manage','notes'].forEach(k => { if (!data[k]) data[k] = []; });
}

// ===== INIT =====
load();
renderAll();

function renderAll() {
  renderGames('board');
  renderGames('video');
  renderGames('other');
  renderManage();
  renderNotes();
  updateStats();
  updateDatalist();
}

// ===== TABS =====
function switchTab(tab, btn) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('sec-' + tab).classList.add('active');
  btn.classList.add('active');
}

// ===== TOGGLE BUTTON =====
function toggleBtn(btn) {
  if (btn.textContent.trim() === 'NO') {
    btn.textContent = 'SÌ';
    btn.classList.remove('no');
    btn.classList.add('yes');
  } else {
    btn.textContent = 'NO';
    btn.classList.remove('yes');
    btn.classList.add('no');
  }
}

function getBtnVal(id) {
  const btn = document.getElementById(id);
  return btn && btn.textContent.trim() === 'SÌ';
}

function resetBtn(id) {
  const btn = document.getElementById(id);
  if (btn) {
    btn.textContent = 'NO';
    btn.classList.remove('yes');
    btn.classList.add('no');
  }
}

// ===== ADD GAME =====
function addGame(cat) {
  const nameEl = document.getElementById(cat + '-name');
  const name = nameEl.value.trim();
  if (!name) { showToast('⚠ Inserisci il nome!', true); return; }

  const entry = {
    id:       Date.now(),
    name:     name,
    out:      getBtnVal(cat + '-out'),
    wish:     getBtnVal(cat + '-wish'),
    date:     document.getElementById(cat + '-date')?.value || '',
    price:    parseFloat(document.getElementById(cat + '-price')?.value) || 0,
    priority: document.getElementById(cat + '-priority')?.value || 'media',
    platform: cat === 'video' ? (document.getElementById('video-platform')?.value || '') : '',
    subcat:   cat === 'other' ? (document.getElementById('other-cat')?.value.trim() || '') : '',
    addedAt:  new Date().toLocaleDateString('it-IT')
  };

  data[cat].push(entry);
  save();

  // Reset form
  nameEl.value = '';
  document.getElementById(cat + '-date') && (document.getElementById(cat + '-date').value = '');
  document.getElementById(cat + '-price') && (document.getElementById(cat + '-price').value = '');
  if (cat === 'other') document.getElementById('other-cat').value = '';
  if (cat === 'video') document.getElementById('video-platform').value = 'PC';
  resetBtn(cat + '-out');
  resetBtn(cat + '-wish');
  document.getElementById(cat + '-priority').value = 'media';

  renderGames(cat);
  updateStats();
  updateDatalist();
  showToast('✔ ' + name + ' aggiunto!');
}

// ===== DELETE GAME =====
function deleteGame(cat, id) {
  data[cat] = data[cat].filter(g => g.id !== id);
  save();
  renderGames(cat);
  updateStats();
  updateDatalist();
  showToast('🗑 Eliminato!');
}

// ===== TOGGLE INLINE (already out) =====
function toggleOut(cat, id) {
  const g = data[cat].find(g => g.id === id);
  if (g) { g.out = !g.out; save(); renderGames(cat); }
}

function toggleWish(cat, id) {
  const g = data[cat].find(g => g.id === id);
  if (g) { g.wish = !g.wish; save(); renderGames(cat); }
}

// ===== RENDER GAMES =====
function renderGames(cat) {
  const list = document.getElementById('list-' + cat);
  const filter = filters[cat] || 'all';
  let items = data[cat].slice();

  if (filter === 'out')      items = items.filter(g => g.out);
  if (filter === 'incoming') items = items.filter(g => !g.out);
  if (filter === 'wish')     items = items.filter(g => g.wish);

  // Sort: priority alta first, then by name
  const priOrd = { alta: 0, media: 1, bassa: 2 };
  items.sort((a,b) => (priOrd[a.priority]||1) - (priOrd[b.priority]||1) || a.name.localeCompare(b.name));

  document.getElementById('count-' + cat).textContent = data[cat].length;

  if (items.length === 0) {
    list.innerHTML = `<div class="empty-state">
      <span class="pixel-icon">${cat==='board'?'🎲':cat==='video'?'🕹️':'📦'}</span>
      <p>Nessun gioco qui... per ora!</p>
    </div>`;
    return;
  }

  list.innerHTML = items.map(g => {
    const priBadge = { alta: '🔴', media: '🟡', bassa: '🟢' }[g.priority] || '';
    const outBadge = g.out
      ? `<span class="badge badge-out-yes">USCITO</span>`
      : `<span class="badge badge-out-no">IN ARRIVO</span>`;
    const wishStar = `<span class="wishlist-star ${g.wish?'active':''}" onclick="toggleWish('${cat}',${g.id})" title="${g.wish?'Togli da wishlist':'Aggiungi a wishlist'}">⭐</span>`;
    const dateStr = g.date ? `<span class="date-tag">📅 ${formatDate(g.date)}</span>${getCountdown(g.date)}` : '';
    const priceStr = g.price ? `<span class="price-tag">💶 ${g.price.toFixed(2)}€</span>` : '';
    const platStr = g.platform ? `<span style="color:var(--purple); font-size:15px;">🖥️ ${g.platform}</span>` : '';
    const subcatStr = g.subcat ? `<span style="color:var(--orange); font-size:15px;">[${g.subcat}]</span>` : '';

    return `<div class="game-card cat-${cat}">
      <span style="font-size:20px;">${priBadge}</span>
      <div class="game-name">${escHtml(g.name)}</div>
      <div class="game-meta">${platStr}${subcatStr}${dateStr}${priceStr}</div>
      ${outBadge}
      ${wishStar}
      <button class="pixel-btn btn-delete" onclick="deleteGame('${cat}',${g.id})">✕ DEL</button>
    </div>`;
  }).join('');
}

// ===== FILTER =====
function setFilter(cat, val, btn) {
  filters[cat] = val;
  btn.closest('.filter-bar').querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderGames(cat);
}

// ===== MANAGE =====
function addManage() {
  const nameEl = document.getElementById('manage-name');
  const name = nameEl.value.trim();
  if (!name) { showToast('⚠ Inserisci il nome!', true); return; }

  const entry = {
    id:      Date.now(),
    name:    name,
    playing: getBtnVal('manage-playing'),
    when:    document.getElementById('manage-when').value.trim(),
    addedAt: new Date().toLocaleDateString('it-IT')
  };

  data.manage.push(entry);
  save();

  nameEl.value = '';
  document.getElementById('manage-when').value = '';
  resetBtn('manage-playing');

  renderManage();
  updateStats();
  showToast('✔ ' + name + ' in gestione!');
}

function deleteManage(id) {
  data.manage = data.manage.filter(g => g.id !== id);
  save();
  renderManage();
  updateStats();
  showToast('🗑 Eliminato!');
}

function toggleManagePlaying(id) {
  const g = data.manage.find(g => g.id === id);
  if (g) { g.playing = !g.playing; save(); renderManage(); }
}

function renderManage() {
  const list = document.getElementById('list-manage');
  document.getElementById('count-manage').textContent = data.manage.length;

  if (data.manage.length === 0) {
    list.innerHTML = `<div class="empty-state">
      <span class="pixel-icon">⚙️</span>
      <p>Nessun gioco in gestione!</p>
    </div>`;
    return;
  }

  // Sort: playing first
  const items = [...data.manage].sort((a,b) => (b.playing?1:0) - (a.playing?1:0));

  list.innerHTML = items.map(g => {
    const playBadge = g.playing
      ? `<span class="badge badge-playing">▶ CI STO GIOCANDO</span>`
      : `<span class="badge" style="background:var(--panel2); color:var(--text-dim); font-family:'Press Start 2P'; font-size:7px; padding:4px 8px;">⏸ IN PAUSA</span>`;
    const whenTag = g.when ? `<span class="when-tag">⏰ ${escHtml(g.when)}</span>` : '';

    return `<div class="manage-card">
      <div class="manage-name">${escHtml(g.name)}</div>
      ${whenTag}
      <span onclick="toggleManagePlaying(${g.id})" style="cursor:pointer;">${playBadge}</span>
      <button class="pixel-btn btn-delete" onclick="deleteManage(${g.id})">✕ DEL</button>
    </div>`;
  }).join('');
}

// ===== DATALIST =====
function updateDatalist() {
  const dl = document.getElementById('manage-datalist');
  if (!dl) return;
  const allGames = [
    ...data.board.map(g => g.name),
    ...data.video.map(g => g.name),
    ...data.other.map(g => g.name)
  ];
  const unique = [...new Set(allGames)].sort();
  dl.innerHTML = unique.map(n => `<option value="${escHtml(n)}">`).join('');
}

// ===== NOTES =====
function addNote() {
  data.notes.push({ id: Date.now(), text: '' });
  save();
  renderNotes();
}

function deleteNote(id) {
  data.notes = data.notes.filter(n => n.id !== id);
  save();
  renderNotes();
  showToast('🗑 Nota eliminata!');
}

function updateNote(id, val) {
  const n = data.notes.find(n => n.id === id);
  if (n) { n.text = val; save(); }
}

function renderNotes() {
  const list = document.getElementById('list-notes');

  if (data.notes.length === 0) {
    list.innerHTML = `<div class="empty-state">
      <span class="pixel-icon">📝</span>
      <p>Nessuna nota. Clicca + NUOVA NOTA!</p>
    </div>`;
    return;
  }

  list.innerHTML = data.notes.map((n, i) => `
    <div class="note-card">
      <div class="note-number">#${String(i+1).padStart(2,'0')}</div>
      <textarea class="note-text" rows="3"
        oninput="updateNote(${n.id}, this.value)"
        placeholder="Scrivi qui la tua nota...">${escHtml(n.text)}</textarea>
      <button class="pixel-btn btn-delete" onclick="deleteNote(${n.id})">✕</button>
    </div>
  `).join('');
}

// ===== STATS =====
function updateStats() {
  document.getElementById('sc-board').textContent   = data.board.length;
  document.getElementById('sc-video').textContent   = data.video.length;
  document.getElementById('sc-other').textContent   = data.other.length;
  document.getElementById('sc-manage').textContent  = data.manage.length;
}

// ===== HELPERS =====
function formatDate(d) {
  if (!d) return '';
  // Try to parse as YYYY-MM-DD
  const iso = d.match(/^(\d{4})-(\d{2})-(\d{2})$/);
  if (iso) {
    const [, y, m, dd] = iso;
    return `${dd}/${m}/${y}`;
  }
  // Otherwise return as-is (free text like "2026", "Estate 2026", "TBA")
  return d;
}

function getCountdown(d) {
  if (!d) return '';
  // Only compute countdown for exact YYYY-MM-DD dates
  const iso = d.match(/^(\d{4})-(\d{2})-(\d{2})$/);
  if (!iso) return '';
  const target = new Date(d);
  const today  = new Date();
  today.setHours(0, 0, 0, 0);
  target.setHours(0, 0, 0, 0);
  const diff = Math.round((target - today) / (1000 * 60 * 60 * 24));
  if (diff === 0)  return `<span class="countdown-today">★ OGGI!</span>`;
  if (diff > 0)    return `<span class="countdown-future">⏳ ${diff} gg</span>`;
  if (diff >= -30) return `<span class="countdown-recent">✔ ${Math.abs(diff)} gg fa</span>`;
  return '';
}

function escHtml(s) {
  return String(s)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

function showToast(msg, isError = false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'show' + (isError ? ' error' : '');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => { t.className = ''; }, 2200);
}
</script>
<script>
if ('serviceWorker' in navigator) {
  const swCode = `
    const CACHE = 'niky-tracker-v1';
    const ASSETS = ['./index.html', './manifest.json', './icon-192.png', './icon-512.png'];
    self.addEventListener('install', e => e.waitUntil(caches.open(CACHE).then(c => c.addAll(ASSETS))));
    self.addEventListener('fetch', e => e.respondWith(caches.match(e.request).then(r => r || fetch(e.request))));
  `;
  const blob = new Blob([swCode], { type: 'application/javascript' });
  const swUrl = URL.createObjectURL(blob);
  navigator.serviceWorker.register(swUrl).catch(() => {});
}
</script>
</body>
